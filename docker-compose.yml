services:
  mongo:
    image: mongo:7
    container_name: bookbotd-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - bookbotd-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  bookbotd-mongo-data:
