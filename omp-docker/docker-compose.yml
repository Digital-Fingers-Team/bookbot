services:
  omp-db:
    image: mariadb:10.11
    container_name: omp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: omp_root_pass
      MYSQL_DATABASE: omp
      MYSQL_USER: omp
      MYSQL_PASSWORD: omp_pass
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - omp-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  omp-app:
    build: .
    container_name: omp-app
    restart: unless-stopped
    depends_on:
      omp-db:
        condition: service_healthy
    ports:
      - "8081:80"
    volumes:
      # OMP source code (extracted full release) lives one level up in ../omp
      - ../omp:/var/www/html

volumes:
  omp-db-data:
